{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cvx-2048.fullname" . }}
  labels:
    {{- include "cvx-2048.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cvx-2048.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Allow from every namespace in the cluster (includes other namespaces).
        - namespaceSelector: {}
      {{- if eq .Values.service.type "LoadBalancer" }}
        # LoadBalancer: also allow traffic originating from outside the cluster.
        # 0.0.0.0/0 matches external client IPs (and node IPs when traffic is
        # SNAT'd by externalTrafficPolicy: Cluster).
        - ipBlock:
            cidr: 0.0.0.0/0
      {{- end }}
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
{{- end }}
